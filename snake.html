<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
    </style>
</head>
<body>
    <div id="scorebox">
        <div id="highscoretxt">High Score: <span id="highscore">0</span></div>

        <div id="scoretxt">Score: <span id="score">0</span></div>
        
    </div>
    <canvas id="gameCanvas" width="300" height="300"></canvas>
    <button id="restart" style="display:none;">Restart</button>
</body>
<script>

    canvas=document.getElementById("gameCanvas");
   const ctx=canvas.getContext("2d");
   ctx.fillStyle="white";
    ctx.strokeStyle = "black";
    ctx.lineWidth=5;
   ctx.fillRect(0,0,300,300);
  ctx.strokeRect(0,0,300,300);
  let snake = [  {x: 150, y: 150},  {x: 140, y: 150},  {x: 130, y: 150},  {x: 120, y: 150},  {x: 110, y: 150},];
  let dx=10;
  let dy=0;
  let playedTimes=0;
  let score=0;
  let scorelist=[0];
  let highScore=0;
  const restartBtn = document.getElementById('restart');
  /*function drawScore(){
    ctx.fillStyle="black";
    ctx.font="10px Arial";
    ctx.fillText("Score: "+score,10,10);
  }*/
  function drawSnakePart(snakePart){
    ctx.fillStyle="lightgreen";
    ctx.strokeStyle = "darkgreen";
    ctx.lineWidth=1;
    ctx.fillRect(snakePart.x, snakePart.y, 10, 10);
    ctx.strokeRect(snakePart.x, snakePart.y, 10, 10);
  }
  function drawSnake(){
    snake.forEach(drawSnakePart);
  }

  
  function SnakeShift(){
    console.log("shift function called");
   
    console.log("shift function called");
    const head={x:snake[0].x+dx,y:snake[0].y+dy};
    const didEatFood=snake[0].x===foodX && snake[0].y===foodY;
    snake.unshift(head);
    if(didEatFood){
        createFood();
        score++;
        document.getElementById("score").innerText=score;
     if(isHighScore()){
        highScore=score;
        document.getElementById("highscore").innerText=highScore;
     }  
    }
    else{
        snake.pop();
    }
    
    console.log("done");
    
  }
  function clearCanvas(){
    console.log("clear canvas called");
     ctx.fillStyle = "white";  ctx.strokeStyle = "black";
     ctx.fillRect(0, 0, canvas.width, canvas.height);  
     ctx.strokeRect(0, 0, canvas.width, canvas.height);
     console.log("executed");
  }

function changeDirection(event) {  const LEFT_KEY = 37; 
     const RIGHT_KEY = 39; 
      const UP_KEY = 38; 
       const DOWN_KEY = 40;
       const keyPressed=event.keyCode;
       const goingUp = dy === -10; 
        const goingDown = dy === 10;  
        const goingRight = dx === 10; 
        const goingLeft = dx === -10;
        if(keyPressed==RIGHT_KEY && !goingLeft){
            dx=10;
            dy=0;
        }
        else if(keyPressed==LEFT_KEY && !goingRight){
            dx=-10;
            dy=0;
        }
        else if(keyPressed==UP_KEY && !goingDown){
            dx=0;
            dy=-10;
        }
        else if(keyPressed==DOWN_KEY && !goingUp){
            dx=0;
            dy=10;
        }

    }
    function randomTen(min,max){
        return Math.round((Math.random()*(max-min)+min)/10)*10;
    }
    function isHighScore(){
        if(score>highScore){
            return true;
        }
        else{
            return false;
        }
    }
    /*function updateHighScore(){
        isHighScore();
        highScore=scorelist.reduce((a,b)=>Math.max(a,b));
    }*/
    /*function drawHighScore(){
        ctx.fillStyle="black";
        ctx.font="10px Arial";
        ctx.fillText("High Score: "+highScore,10,20);
    }*/
    function createFood() {  
        foodX = randomTen(0, gameCanvas.width - 10); 
         foodY = randomTen(0, gameCanvas.height - 10);
          snake.forEach(
          function isFoodOnSnake(part) {    const foodIsOnSnake = part.x == foodX && part.y == foodY ;
            if (foodIsOnSnake) createFood();  });
          }
          function drawFood(){
            ctx.fillStyle = 'red';  
             ctx.strokeStyle = 'darkred';  
              ctx.fillRect(foodX, foodY, 10, 10);  
               ctx.strokeRect(foodX, foodY, 10, 10);
          }
    
    function didGameEnd() {
        if (snake[0].x < 0 || snake[0].x >= gameCanvas.width || snake[0].y < 0 || snake[0].y >= gameCanvas.height) return true;
         for (let i = 4; i < snake.length; i++) {  
            if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true; }
             return false;
         }
         function restarartGame(){
            snake = [  {x: 150, y: 150},  {x: 140, y: 150},  {x: 130, y: 150},  {x: 120, y: 150},  {x: 110, y: 150},];
            dx=10;
            dy=0;
            score=0;
            document.getElementById("score").innerText=score;
            restartBtn.style.display = 'none';
            createFood();
            main();
         }
         function drawGameOver(){
            ctx.fillStyle = 'black';  
            ctx.font = '20px Arial';  
             ctx.fillText('Game Over!', 50, 150);
             restartBtn.style.display = 'block';
             restartBtn.addEventListener('click', restarartGame);
         }  
         function gameOver() { 
                clearCanvas();
                drawGameOver();
             restartBtn.addEventListener('click', restarartGame);
             if(score==highScore && score!=0 ){
                ctx.fillText('New High Score:'+highScore, 50, 180);}
              }
              
 function main(){
    if(didGameEnd()){
        gameOver();
        return;
    }
    else{
    setTimeout(function onTick(){
        clearCanvas();
        drawFood();
        SnakeShift();
        drawSnake();
        //drawScore();
        //drawHighScore();
        main() ;
        document.addEventListener("keydown", changeDirection);;},100);}}
createFood();
main();

  </script>
</html>
